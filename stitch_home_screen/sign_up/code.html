<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3884ff",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0f1723",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>AIXStore Sign Up</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start focus:outline-none">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1">Create Account</h2>
</div>
<!-- Hero / Branding Section -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-primary/10 @[480px]:rounded-lg min-h-[180px] border-b border-slate-200 dark:border-slate-800" data-alt="Abstract vibrant shopping bags and fashion accessories background" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDO2w2hDdSfV3GorM6V9SC9wbhUrL7g2vmbS_qd2XuDisxwUYssrJSzQ5UEYVRgBNZhpnzfenLGMNcxSOy8aXzYxEumn5xTMrrdO-tWQn1LPd8Gns2o6CwkN6xfPaPJHVvpVPanh0_Yrcj_szpA8PjVa_UEn_9AdKxqJeciofDbfo-lT4wZufGw7sZBtJHq7Nd3l0ReIRsbuOqFN9T5W3oY-GJkp4yK9S2lFDVdhQ0nc0w8b8mE_tzPA5Z85uWqz7VVAfktSto6E082");'>
</div>
</div>
</div>
<div class="px-4 pt-6 pb-2">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight">Join AIXStore</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Start your premium shopping journey today.</p>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-4 px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Full Name</p>
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal transition-all" placeholder="Enter your full name" type="text" value=""/>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Email</p>
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal transition-all" placeholder="Enter your email" type="email" value=""/>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Password</p>
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal transition-all" placeholder="Create a password" type="password" value=""/>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Confirm Password</p>
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal transition-all" placeholder="Confirm your password" type="password" value=""/>
</label>
</div>
<!-- Action Button -->
<div class="px-4 py-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center">
                Sign Up
            </button>
</div>
<!-- Divider -->
<div class="flex items-center px-4 py-4">
<div class="flex-grow border-t border-slate-300 dark:border-slate-700"></div>
<span class="px-4 text-slate-500 dark:text-slate-400 text-sm font-medium">Or continue with</span>
<div class="flex-grow border-t border-slate-300 dark:border-slate-700"></div>
</div>
<!-- Social Logins -->
<div class="flex gap-4 px-4 py-2">
<button class="flex-1 flex items-center justify-center gap-2 h-14 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-slate-700 dark:text-slate-300 font-medium">Google</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 h-14 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">
<svg class="w-5 h-5 fill-slate-900 dark:fill-white" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05 1.78-3.33 1.76-1.25-.02-1.65-.78-3.13-.78-1.47 0-1.92.76-3.13.78-1.27.02-2.33-.81-3.31-1.74-2-1.9-3.48-5.38-1.5-8.73.98-1.65 2.68-2.7 4.54-2.73 1.41-.02 2.73.96 3.59.96.86 0 2.47-1.16 4.16-1 1.72.07 3 .7 3.84 1.93-3.48 2.05-2.92 6.64.44 8.05-.72 1.83-1.88 3.63-3.21 5zm-3.12-16.2c.77-.92 1.28-2.21 1.14-3.5-1.12.04-2.48.75-3.28 1.68-.72.82-1.35 2.14-1.18 3.4 1.24.1 2.53-.66 3.32-1.58z"></path>
</svg>
<span class="text-slate-700 dark:text-slate-300 font-medium">Apple</span>
</button>
</div>
<!-- Footer Link -->
<div class="px-4 py-8 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                Already have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Log In</a>
</p>
</div>
<!-- Spacer -->
<div class="h-10 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
