<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AIX Store | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#3884ff",
                "background-light": "#f8fafc",
                "background-dark": "#0f172a",
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {
                "DEFAULT": "0.5rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "2xl": "1rem",
                "full": "9999px"
              },
            },
          },
        }
    </script>
<style>
        body {
            min-height: 100dvh;
        }
        .input-focus-ring:focus-within {
            ring: 2px;
            ring-color: #3884ff;
            border-color: #3884ff;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md">
<!-- Brand Identity -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-white dark:bg-slate-900 shadow-xl shadow-slate-200/60 dark:shadow-none border border-slate-100 dark:border-slate-800 mb-6 relative group overflow-hidden">
<div class="absolute inset-0 bg-primary opacity-5 group-hover:opacity-10 transition-opacity"></div>
<div class="w-12 h-12 rounded-xl bg-primary flex items-center justify-center shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-white text-3xl">shield_lock</span>
</div>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-50">Welcome to AIX Store</h1>
<p class="text-slate-500 dark:text-slate-400 mt-3 text-lg">Manage your account with ease and security.</p>
</div>
<!-- Main Card -->
<div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl shadow-slate-200/50 dark:shadow-none border border-slate-200/60 dark:border-slate-800 overflow-hidden">
<!-- Tabs Navigation (Professional underline style) -->
<div class="flex border-b border-slate-100 dark:border-slate-800 px-8">
<button class="py-5 text-sm font-bold text-primary border-b-2 border-primary transition-colors tracking-wide">
                    LOGIN
                </button>
</div>
<div class="p-8 lg:p-10">
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-xl">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between mb-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-sm font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-xl">lock</span>
<input class="w-full pl-12 pr-12 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<div class="flex items-center">
<input class="w-4 h-4 rounded-sm text-primary focus:ring-primary/30 border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-3 text-sm font-medium text-slate-600 dark:text-slate-400 cursor-pointer" for="remember">Keep me logged in</label>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/25 transition-all flex items-center justify-center space-x-2 active:scale-[0.98]" type="submit">
<span class="tracking-wide">Sign In</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs font-bold uppercase tracking-widest">
<span class="px-4 bg-white dark:bg-slate-900 text-slate-400">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid gap-4">
<button class="flex items-center justify-center px-4 py-3 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-all group active:scale-[0.99]">
<img alt="Google Logo" class="w-5 h-5 mr-3" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBlnsvWDPmsIGtxA1oBOg1y4DAqAhVE8xdxok6af3kr8C0UIFwhqEc8GuY2pwOuPQkV1HKRzcyqVaWZ8_6ELkm2oEVo_jXu4Nhgd5rS93Bog4lNL6rgOwuQ4EkNZ-CG7c_fvgUb-AX4GLzH4IXjnrTVFXl3ubAj0A3U4yfJoOUzatY3bqGYHY9hV9FN7bWoDTbdwjMeUzFAinnZ0BIw5fg1O1ViTv8hiZFjNf0oCPhdJJ0-8Eb4FJ6oab77erziExvdZrC_leWaSdbe"/>
<span class="text-sm font-bold text-slate-700 dark:text-slate-300 group-hover:text-slate-900 dark:group-hover:text-white">Sign in with Google</span>
</button>
</div>
</div>
<!-- Footer Info -->
<div class="px-8 py-5 bg-slate-50 dark:bg-slate-800/40 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-xs leading-relaxed text-slate-500 dark:text-slate-400">
                    By accessing your account, you agree to our 
                    <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and 
                    <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>.
                </p>
</div>
</div>
<div class="mt-8 text-center text-sm">
<p class="text-slate-600 dark:text-slate-400">Don't have an account? <a class="text-primary font-bold hover:underline transition-all underline-offset-4" href="#">Sign Up Now</a></p>
</div>
<!-- Security Badge -->
<div class="mt-12 flex items-center justify-center space-x-3 text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined text-lg">lock</span>
<span class="text-[10px] font-bold uppercase tracking-[0.2em]">256-bit SSL Secure Encryption</span>
</div>
</div>
</body></html>
